<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regular Expression Toolkit</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Regular Expression Toolkit</h1>
        <p class="subtitle">Generate strings, visualize parse trees, and verify equivalence</p>

        <div class="main-grid">
            <!-- Sidebar -->
            <div class="panel">
                <div class="panel-title">Symbol Palette</div>

                <div class="palette-section">
                    <div class="palette-section-title">Basic Operators</div>
                    <div class="palette-grid">
                        <button class="palette-btn" onclick="insertSymbol('|')"><span class="symbol">|</span><span class="desc">Union</span></button>
                        <button class="palette-btn" onclick="insertSymbol('*')"><span class="symbol">*</span><span class="desc">Star</span></button>
                        <button class="palette-btn" onclick="insertSymbol('+')"><span class="symbol">+</span><span class="desc">Plus</span></button>
                        <button class="palette-btn" onclick="insertSymbol('?')"><span class="symbol">?</span><span class="desc">Optional</span></button>
                    </div>
                </div>

                <div class="palette-section">
                    <div class="palette-section-title">Grouping</div>
                    <div class="palette-grid">
                        <button class="palette-btn" onclick="insertSymbol('()')">( )</button>
                        <button class="palette-btn" onclick="insertSymbol('ε')">ε</button>
                        <button class="palette-btn" onclick="insertSymbol('∅')">∅</button>
                    </div>
                </div>

                <div class="palette-section">
                    <div class="palette-section-title">Examples</div>
                    <div class="example-btns">
                        <button class="example-btn" onclick="loadExample('(a|b)*abb')">ends abb</button>
                        <button class="example-btn" onclick="loadExample('a*b*c*')">a*b*c*</button>
                    </div>
                </div>
            </div>

            <!-- Main -->
            <div>
                <div class="panel">
                    <div class="panel-title">Regex Input</div>

                    <div class="regex-input-wrapper">
                        <input id="regexInput" class="regex-input" value="(a|b)*abb">
                        <button class="generate-btn" onclick="generateStrings()">Generate</button>
                    </div>

                    <div id="errorDisplay"></div>
                </div>

                <div class="panel">
                    <div class="panel-title">Results</div>

                    <div class="results-grid">
                        <div id="stringsList"></div>
                        <div id="parseTree"></div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-title">Equivalence</div>

                    <input id="equivInput1" value="(a|b)*">
                    <input id="equivInput2" value="(a*b*)*">

                    <button onclick="checkEquivalence()">Check</button>
                    <div id="equivResult"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- External JS -->
    <script src="script.js"></script>
</body>
</html>
