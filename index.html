<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regular Expression Toolkit</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Regular Expression Toolkit</h1>
        <p class="subtitle">Generate strings, visualize parse trees, and verify equivalence</p>

        <div class="main-grid">
            <!-- Sidebar -->
            <div class="panel">
                <div class="panel-title">Symbol Palette</div>

                <!-- (PASTE SAME SIDEBAR HTML HERE — unchanged) -->
                <!-- KEEP EVERYTHING SAME FROM YOUR ORIGINAL HTML -->
            </div>

            <!-- Main Content -->
            <div>
                <!-- Input Section -->
                <div class="panel">
                    <div class="panel-title">Regular Expression Input</div>

                    <div class="regex-input-wrapper">
                        <input type="text" id="regexInput" class="regex-input" value="(a|b)*abb">
                        <button class="generate-btn" onclick="generateStrings()">Generate</button>
                        <button class="clear-btn" onclick="clearInput()">Clear</button>
                    </div>

                    <div id="errorDisplay"></div>
                </div>

                <!-- Results -->
                <div class="panel">
                    <div id="stringsList" class="strings-list"></div>
                    <div id="parseTree" class="parse-tree"></div>
                    <div id="statsDisplay"></div>
                </div>

                <!-- Equivalence -->
                <div class="panel">
                    <input type="text" id="equivInput1" value="(a|b)*">
                    <input type="text" id="equivInput2" value="(a*b*)*">
                    <button onclick="checkEquivalence()">Check</button>
                    <div id="equivResult"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- External JS -->
    <script src="script.js"></script>
</body>
</html>
